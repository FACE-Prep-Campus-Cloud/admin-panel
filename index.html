<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #FFFFFF;
    --soft-blue: #EFF6FF;
    --lavender: #F5F3FF;
    --mint: #F0FDF4;
    --accent: #6366F1;
    --accent-dark: #4F46E5;
    --text-primary: #1E293B;
    --text-secondary: #64748B;
    --border: #E2E8F0;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 12px;
    --chart-colors: #6366F1,#06B6D4,#10B981,#F59E0B,#EF4444,#8B5CF6,#EC4899;
  }
  body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: var(--text-primary); min-height: 100vh; }

  /* NAV */
  #top-nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .nav-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    width: 36px; height: 36px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .nav-title { font-weight: 700; font-size: 16px; color: var(--text-primary); }
  .nav-subtitle { font-size: 12px; color: var(--text-secondary); }
  .tab-bar {
    display: flex; overflow-x: auto; gap: 2px; padding: 0 16px;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 10px 14px; font-size: 12px; font-weight: 500;
    color: var(--text-secondary); background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.2s ease;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--accent); background: var(--lavender); border-radius: 6px 6px 0 0; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* CONTENT */
  #content { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; margin-bottom: 24px; }
  .chart-grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-bottom: 24px; }

  /* CARDS */
  .card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px; transition: all 0.2s ease;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.10); }

  /* KPI CARDS */
  .kpi-card { border: 1px solid var(--border); }
  .kpi-card.green { background: var(--mint); border-color: #BBF7D0; }
  .kpi-card.amber { background: #FFFBEB; border-color: #FDE68A; }
  .kpi-card.blue { background: var(--soft-blue); border-color: #BFDBFE; }
  .kpi-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .kpi-sub { font-size: 10px; color: var(--text-secondary); margin-top: 4px; text-transform: capitalize; }

  /* CHART CONTAINERS */
  .chart-card { padding: 20px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 300px; }

  /* INSIGHT BOXES */
  .insight-box {
    background: #FEFCE8; border-left: 3px solid #F59E0B;
    border-radius: 0 8px 8px 0; padding: 12px 16px; margin-bottom: 12px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .insight-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .insight-text { font-size: 13px; color: #78350F; line-height: 1.5; }
  .insights-section { margin-bottom: 24px; }
  .insights-section h3 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* DATA TABLE */
  .table-card { overflow: hidden; }
  .table-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; font-family: inherit; outline: none;
    transition: all 0.2s ease;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  .table-info { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #F8FAFC; }
  th {
    padding: 10px 12px; text-align: left; font-weight: 600; font-size: 11px;
    color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px;
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; transition: all 0.2s ease;
  }
  th:hover { color: var(--accent); }
  th.asc::after { content: ' ↑'; }
  th.desc::after { content: ' ↓'; }
  td { padding: 9px 12px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
  tr:nth-child(even) td { background: #F8FAFC; }
  tr:hover td { background: var(--soft-blue); }
  .pagination { display: flex; align-items: center; gap: 8px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
  .page-btn {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--white); font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s ease; font-family: inherit;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-info { font-size: 12px; color: var(--text-secondary); }

  /* LOADING / ERROR */
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); }
  .error-card { background: #FFF1F2; border: 1px solid #FECDD3; border-radius: var(--radius); padding: 24px; text-align: center; }
  .error-card .error-icon { font-size: 32px; margin-bottom: 12px; }
  .error-card p { font-size: 14px; color: #9F1239; }

  /* SECTION HEADERS */
  .section-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
  .section-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
  .divider { height: 1px; background: var(--border); margin: 28px 0; }

  /* OVERVIEW */
  .overview-hero {
    background: linear-gradient(135deg, var(--accent) 0%, #8B5CF6 100%);
    border-radius: var(--radius); padding: 32px; color: white; margin-bottom: 24px;
  }
  .overview-hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .overview-hero p { font-size: 14px; opacity: 0.85; line-height: 1.6; max-width: 700px; }
  .table-count-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .table-count-card {
    background: var(--white); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; cursor: pointer; transition: all 0.2s ease;
  }
  .table-count-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
  .table-count-card .tc-name { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .table-count-card .tc-count { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .table-count-card .tc-rows { font-size: 10px; color: var(--text-secondary); }

  /* INFO NOTE */
  .info-note { background: var(--soft-blue); border: 1px solid #BFDBFE; border-radius: 8px; padding: 16px; font-size: 13px; color: #1E40AF; margin-bottom: 16px; }

  /* COMBINED VIEW */
  .combined-section { margin-bottom: 40px; }
  .combined-header { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
  .combined-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; }

  @media (max-width: 768px) {
    #content { padding: 16px; }
    .chart-grid, .chart-grid-3 { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .nav-header { padding: 12px 16px; }
  }
</style>
</head>

// ============================================================
// CHART COLORS
// ============================================================
const CHART_COLORS = ['#6366F1','#06B6D4','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899'];

// ============================================================
// STATE
// ============================================================
const dataCache = {};
const chartInstances = {};

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (typeof n === 'number') return n.toLocaleString('en-IN', { maximumFractionDigits: 2 });
  return n;
}

function fmtCell(v) {
  if (v === null || v === undefined) return '<span style="color:#94A3B8">—</span>';
  if (typeof v === 'number') return v.toLocaleString('en-IN', { maximumFractionDigits: 2 });
  if (typeof v === 'string' && v.length > 40) return `<span title="${v}">${v.substring(0,38)}…</span>`;
  return v;
}

function loading() {
  return `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Loading data…</div></div>`;
}

function errorCard(msg) {
  return `<div class="error-card"><div class="error-icon">⚠️</div><p>${msg}</p></div>`;
}

function kpiColorClass(agg) {
  if (['sum','max'].includes(agg)) return 'green';
  if (['avg'].includes(agg)) return 'amber';
  return 'blue';
}

// Aggregate data
function aggregate(data, col, method) {
  const vals = data.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
  if (!vals.length) return 0;
  if (method === 'sum') return vals.reduce((a,b) => a+b, 0);
  if (method === 'avg') return vals.reduce((a,b) => a+b, 0) / vals.length;
  if (method === 'max') return Math.max(...vals);
  if (method === 'min') return Math.min(...vals);
  if (method === 'count') {
    const uniq = new Set(data.map(r => r[col]).filter(v => v !== null && v !== undefined && v !== ''));
    return uniq.size;
  }
  return vals.length;
}

// Group by a text/date column, sum a numeric column
function groupBy(data, xCol, yCol) {
  const map = {};
  data.forEach(row => {
    const k = row[xCol] ?? 'Unknown';
    const v = parseFloat(row[yCol]) || 0;
    map[k] = (map[k] || 0) + v;
  });
  // Sort by key
  const sorted = Object.entries(map).sort((a,b) => String(a[0]).localeCompare(String(b[0])));
  return { labels: sorted.map(e => String(e[0]).substring(0,20)), values: sorted.map(e => e[1]) };
}

// ============================================================
// CHART RENDERING
// ============================================================
function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
}

function renderChart(canvasId, chartDef, data) {
  destroyChart(canvasId);
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const { labels, values } = groupBy(data, chartDef.x, chartDef.y);
  if (!labels.length) return;

  const type = chartDef.type === 'donut' ? 'doughnut' : chartDef.type;
  const isRound = (type === 'doughnut' || type === 'pie');

  const colors = labels.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]);

  const cfg = {
    type,
    data: {
      labels,
      datasets: [{
        label: chartDef.y,
        data: values,
        backgroundColor: isRound ? colors : colors[0] + '99',
        borderColor: isRound ? colors : colors[0],
        borderWidth: isRound ? 2 : 2,
        fill: type === 'line' ? false : undefined,
        tension: 0.3,
        pointRadius: type === 'line' ? 2 : undefined
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: isRound, position: 'bottom', labels: { font: { size: 11, family: 'Inter' }, boxWidth: 12 } },
        tooltip: {
          callbacks: {
            label: ctx2 => {
              const v = ctx2.parsed.y ?? ctx2.parsed;
              return ` ${typeof v === 'number' ? v.toLocaleString('en-IN', { maximumFractionDigits: 2 }) : v}`;
            }
          }
        }
      },
      scales: isRound ? {} : {
        x: { ticks: { font: { size: 10, family: 'Inter' }, maxRotation: 45 }, grid: { display: false } },
        y: { ticks: { font: { size: 10, family: 'Inter' }, callback: v => v >= 1000 ? (v/1000).toFixed(0)+'K' : v }, grid: { color: '#F1F5F9' } }
      }
    }
  };

  chartInstances[canvasId] = new Chart(ctx, cfg);
}

// ============================================================
// DATA TABLE (paginated, searchable, sortable)
// ============================================================
function buildTable(containerId, data, columns, tableKey) {
  const state = { page: 1, perPage: 25, sortCol: null, sortDir: 1, search: '' };
  const container = document.getElementById(containerId);
  if (!container) return;

  function filtered() {
    const q = state.search.toLowerCase();
    if (!q) return data;
    return data.filter(row => columns.some(c => String(row[c.name] ?? '').toLowerCase().includes(q)));
  }

  function sorted(rows) {
    if (!state.sortCol) return rows;
    return [...rows].sort((a, b) => {
      const av = a[state.sortCol] ?? '';
      const bv = b[state.sortCol] ?? '';
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return state.sortDir * (an - bn);
      return state.sortDir * String(av).localeCompare(String(bv));
    });
  }

  function render() {
    const rows = sorted(filtered());
    const total = rows.length;
    const pages = Math.max(1, Math.ceil(total / state.perPage));
    state.page = Math.min(state.page, pages);
    const slice = rows.slice((state.page-1)*state.perPage, state.page*state.perPage);

    const headerCells = columns.map(c => {
      const cls = state.sortCol === c.name ? (state.sortDir > 0 ? 'asc' : 'desc') : '';
      return `<th class="${cls}" data-col="${c.name}">${c.display_label}</th>`;
    }).join('');

    const bodyRows = slice.map(row => {
      const cells = columns.map(c => `<td>${fmtCell(row[c.name])}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('') || `<tr><td colspan="${columns.length}" style="text-align:center;color:#94A3B8;padding:24px">No records found</td></tr>`;

    container.innerHTML = `
      <div class="table-controls">
        <input class="search-input" type="search" placeholder="Search all columns…" value="${state.search}">
        <span class="table-info">${total.toLocaleString()} rows</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>${headerCells}</tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
      <div class="pagination">
        <button class="page-btn" id="${containerId}-prev" ${state.page===1?'disabled':''}>← Prev</button>
        <span class="page-info">Page ${state.page} of ${pages}</span>
        <button class="page-btn" id="${containerId}-next" ${state.page>=pages?'disabled':''}>Next →</button>
      </div>`;

    container.querySelector('.search-input').addEventListener('input', e => {
      state.search = e.target.value; state.page = 1; render();
    });
    container.querySelector(`#${containerId}-prev`).addEventListener('click', () => { state.page--; render(); });
    container.querySelector(`#${containerId}-next`).addEventListener('click', () => { state.page++; render(); });
    container.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (state.sortCol === col) state.sortDir *= -1;
        else { state.sortCol = col; state.sortDir = 1; }
        render();
      });
    });
  }
  render();
}

// ============================================================
// AUTO-INSIGHT FROM DATA
// ============================================================
function autoInsight(data, tableInfo) {
  if (!data.length) return null;
  // Find a numeric col and show its max record
  const numCol = tableInfo.numeric_columns[0];
  if (numCol) {
    const maxRow = data.reduce((best, r) => (parseFloat(r[numCol]||0) > parseFloat(best[numCol]||0)) ? r : best, data[0]);
    const val = parseFloat(maxRow[numCol]);
    if (!isNaN(val)) {
      const dateCol = tableInfo.date_columns[0];
      const datePart = dateCol && maxRow[dateCol] ? ` on ${maxRow[dateCol]}` : '';
      return `Highest recorded ${numCol.replace(/_/g,' ')} is ${val.toLocaleString('en-IN', {maximumFractionDigits:2})}${datePart}. Total records loaded: ${data.length.toLocaleString()}.`;
    }
  }
  return `Total records loaded: ${data.length.toLocaleString()}.`;
}

// ============================================================
// RENDER TABLE TAB
// ============================================================
async function renderTableTab(panelId, tableInfo) {
  const panel = document.getElementById(panelId);
  if (!panel) return;

  // Check cache
  if (!dataCache[tableInfo.table_name]) {
    panel.innerHTML = loading();
    try {
      const { data, error } = await client.from(tableInfo.table_name).select('*').limit(1000);
      if (error) throw error;
      dataCache[tableInfo.table_name] = data || [];
    } catch(e) {
      panel.innerHTML = errorCard(`Failed to load ${tableInfo.display_name}: ${e.message || e}`);
      return;
    }
  }

  const data = dataCache[tableInfo.table_name];
  const tooFew = data.length < 5;

  // Build KPI cards
  const kpiHtml = tableInfo.kpi_suggestions.map(k => {
    const val = aggregate(data, k.column, k.aggregation);
    const cls = kpiColorClass(k.aggregation);
    const disp = typeof val === 'number' ? val.toLocaleString('en-IN', { maximumFractionDigits: 2 }) : val;
    return `<div class="card kpi-card ${cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${disp}</div>
      <div class="kpi-sub">${k.aggregation}</div>
    </div>`;
  }).join('');

  // Build chart placeholders
  let chartsHtml = '';
  if (!tooFew) {
    chartsHtml = `<div class="chart-grid">` + tableInfo.suggested_charts.map((ch, i) => {
      const cid = `chart-${tableInfo.table_name}-${i}`;
      return `<div class="card chart-card">
        <div class="chart-title">${ch.title}</div>
        <div class="chart-wrap"><canvas id="${cid}"></canvas></div>
      </div>`;
    }).join('') + `</div>`;
  }

  // Build insights
  const autoIns = autoInsight(data, tableInfo);
  const insightsHtml = `<div class="insights-section">
    <h3>Key Insights</h3>
    ${tableInfo.key_insights.map(ins => `<div class="insight-box"><span class="insight-icon">💡</span><span class="insight-text">${ins}</span></div>`).join('')}
    ${autoIns ? `<div class="insight-box"><span class="insight-icon">📊</span><span class="insight-text">${autoIns}</span></div>` : ''}
  </div>`;

  const tooFewNote = tooFew ? `<div class="info-note">ℹ️ Fewer than 5 rows found — charts skipped. Showing data table only.</div>` : '';

  panel.innerHTML = `
    <div class="section-title">${tableInfo.display_name}</div>
    <div class="section-desc">${tableInfo.purpose}</div>
    <div class="kpi-grid">${kpiHtml}</div>
    ${tooFewNote}
    ${chartsHtml}
    ${insightsHtml}
    <div class="divider"></div>
    <div class="card table-card" id="tbl-wrap-${tableInfo.table_name}"></div>`;

  // Render charts
  if (!tooFew) {
    tableInfo.suggested_charts.forEach((ch, i) => {
      const cid = `chart-${tableInfo.table_name}-${i}`;
      renderChart(cid, ch, data);
    });
  }

  // Render table
  buildTable(`tbl-wrap-${tableInfo.table_name}`, data, tableInfo.columns, tableInfo.table_name);
}

// ============================================================
// COMBINED VIEW TAB
// ============================================================
async function renderCombinedTab(panelId) {
  const panel = document.getElementById(panelId);
  if (!panel) return;

  panel.innerHTML = loading();

  // Fetch all needed tables
  const needed = new Set();
  COMBINED_VIEWS.forEach(cv => cv.tables.forEach(t => needed.add(t)));
  const fetches = [];
  needed.forEach(t => {
    if (!dataCache[t]) {
      fetches.push(client.from(t).select('*').limit(1000).then(({data,error}) => {
        if (!error) dataCache[t] = data || [];
      }));
    }
  });
  try { await Promise.all(fetches); } catch(e) {}

  let html = '';
  COMBINED_VIEWS.forEach((cv, cvIdx) => {
    const [tA, tB] = cv.tables;
    const dataA = dataCache[tA] || [];
    const dataB = dataCache[tB] || [];
    const infoA = TABLES.find(t => t.table_name === tA);
    const infoB = TABLES.find(t => t.table_name === tB);
    if (!infoA || !infoB) return;

    // Simple join: merge records from A augmented with matching B field
    const key = cv.shared_key;
    const mapB = {};
    dataB.forEach(r => {
      const k = r[key];
      if (k !== null && k !== undefined) {
        if (!mapB[k]) mapB[k] = [];
        mapB[k].push(r);
      }
    });

    // Build combined rows showing A data + count of matching B rows
    const joined = dataA.map(ra => {
      const matches = mapB[ra[key]] || [];
      const bNumCols = infoB.numeric_columns;
      const bExtra = {};
      bNumCols.forEach(c => {
        const sum = matches.reduce((acc, rb) => acc + (parseFloat(rb[c]) || 0), 0);
        bExtra[`${tB}_${c}`] = sum || null;
      });
      return { ...ra, ...bExtra, _match_count: matches.length };
    });

    // Chart: numeric col from A vs numeric col from B
    const yA = infoA.numeric_columns[0];
    const yB = infoB.numeric_columns[0];
    const chartIdA = `comb-chart-${cvIdx}-a`;
    const chartIdB = `comb-chart-${cvIdx}-b`;

    // Combined columns for table
    const combinedCols = [
      ...infoA.columns.filter(c => c.name === key || infoA.numeric_columns.includes(c.name)),
      ...infoB.numeric_columns.map(c => ({ name: `${tB}_${c}`, display_label: `${infoB.display_name}: ${c}` }))
    ];

    html += `<div class="combined-section">
      <div class="combined-header">${cv.title}: ${infoA.display_name} ↔ ${infoB.display_name}</div>
      <div class="combined-desc">Joined on <strong>${key}</strong> — ${cv.suggested_chart}</div>
      <div class="chart-grid">
        ${yA ? `<div class="card chart-card"><div class="chart-title">${infoA.display_name}: ${yA}</div><div class="chart-wrap"><canvas id="${chartIdA}"></canvas></div></div>` : ''}
        ${yB ? `<div class="card chart-card"><div class="chart-title">${infoB.display_name}: ${yB}</div><div class="chart-wrap"><canvas id="${chartIdB}"></canvas></div></div>` : ''}
      </div>
      <div class="card table-card" id="comb-tbl-${cvIdx}"></div>
      <div class="divider"></div>
    </div>`;
  });

  panel.innerHTML = `
    <div class="section-title">Combined Views</div>
    <div class="section-desc">Cross-table analysis — data from two tables joined on a shared key for integrated insights.</div>
    ${html}`;

  // Now render charts + tables
  COMBINED_VIEWS.forEach((cv, cvIdx) => {
    const [tA, tB] = cv.tables;
    const dataA = dataCache[tA] || [];
    const dataB = dataCache[tB] || [];
    const infoA = TABLES.find(t => t.table_name === tA);
    const infoB = TABLES.find(t => t.table_name === tB);
    if (!infoA || !infoB) return;

    const key = cv.shared_key;
    const mapB = {};
    dataB.forEach(r => {
      const k = r[key];
      if (k !== null && k !== undefined) {
        if (!mapB[k]) mapB[k] = [];
        mapB[k].push(r);
      }
    });
    const joined = dataA.map(ra => {
      const matches = mapB[ra[key]] || [];
      const bExtra = {};
      infoB.numeric_columns.forEach(c => {
        const sum = matches.reduce((acc, rb) => acc + (parseFloat(rb[c]) || 0), 0);
        bExtra[`${tB}_${c}`] = sum || null;
      });
      return { ...ra, ...bExtra };
    });

    const yA = infoA.numeric_columns[0];
    const yB = infoB.numeric_columns[0];

    if (yA) renderChart(`comb-chart-${cvIdx}-a`, { type:'bar', x: key, y: yA, title: `${infoA.display_name}: ${yA}` }, dataA);
    if (yB) renderChart(`comb-chart-${cvIdx}-b`, { type:'bar', x: key, y: yB, title: `${infoB.display_name}: ${yB}` }, dataB);

    const combinedCols = [
      ...infoA.columns.filter(c => c.name === key || infoA.numeric_columns.includes(c.name)),
      ...infoB.numeric_columns.map(c => ({ name: `${tB}_${c}`, display_label: `${infoB.display_name}: ${c}` }))
    ];
    buildTable(`comb-tbl-${cvIdx}`, joined, combinedCols, `comb-${cvIdx}`);
  });
}

// ============================================================
// TAB MANAGEMENT
// ============================================================
function activateTab(panelId) {
  // Update buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.panel === panelId);
  });
  // Update panels
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === panelId);
  });
  // Lazy load
  const panel = document.getElementById(panelId);
  if (!panel) return;
  if (panel.dataset.loaded) return;
  panel.dataset.loaded = '1';

  if (panelId === 'tab-overview') {
    renderOverview();
  } else if (panelId === 'tab-combined') {
    renderCombinedTab(panelId);
  } else {
    const tname = panelId.replace('tab-', '');
    const tinfo = TABLES.find(t => t.table_name === tname);
    if (tinfo) renderTableTab(panelId, tinfo);
  }
}

        <div class="insight-box"><span class="insight-icon">💡</span><span class="insight-text">This dashboard covers <strong>${TABLES.length} tables</strong> with a combined ~${TABLES.reduce((a,t) => a+t.row_count,0).toLocaleString()} estimated records. Click any table card above to navigate directly to that module.</span></div>
        <div class="insight-box"><span class="insight-icon">💡</span><span class="insight-text">All data is fetched live from Supabase. Each tab loads on first click and is then cached for fast tab switching.</span></div>
        <div class="insight-box"><span class="insight-icon">💡</span><span class="insight-text">Use the <strong>Combined Views</strong> tab to see cross-table joins — vehicles running costs, inflow vs outflow, and more.</span></div>
      </div>
    </div>
    ${TABLES.map(t => `<div id="tab-${t.table_name}" class="tab-panel">${loading()}</div>`).join('')}
    <div id="tab-combined" class="tab-panel">${loading()}</div>`;

  // Wire up tab clicks
  tabBar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => activateTab(btn.dataset.panel));
  });

  // Activate overview
  activateTab('tab-overview');
}

window.activateTab = activateTab;
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
